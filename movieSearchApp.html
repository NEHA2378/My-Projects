<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            font-family: sans-serif;
        }
        body{
            background-color: black;
        }
        .mid{
            padding: 40px 0px;
            max-width: 1320px;
            margin: auto;
        }
        form{
            display: flex;
            align-items: center;
        }
        form label{
            color: white;
            font-size: 24px;
            padding: 0px 10px;
        }
        form input{
            height: 40px;
            flex-grow: 1;
            padding: 0px 10px;
            margin: 0px 10px;
            border-radius: 15px;
            border: none;
            box-shadow: 8px 8px 0px #8bb6e8;
        }

        .main{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .mainItem{
            background-color: yellow;
            margin-top: 50px;
        }
        .mainItem img{
            width: 100%;
        }
        .content{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
        }

        
    </style>
</head>
<body>
    <div class="mid">
        <header>
            <form action="">
                <label for="name">Search Movie</label>
                <input type="text">
            </form>
        </header>
        <div class="main">
            
        </div>
    </div>
</body>
<script>
    let formElement = document.querySelector("form")
    let mainElement = document.querySelector(".main")

    let getMovie = async (SearchText = '') => {
        mainElement.innerHTML=''
        let apiUrl;
        if(SearchText == ''){
            apiUrl = `https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=04c35731a5ee918f014970082a0088b1&page=1`
        }
        else{
            apiUrl = `https://api.themoviedb.org/3/search/movie?api_key=04c35731a5ee918f014970082a0088b1&query=${SearchText}`
        }

        let apiRes = await fetch(apiUrl)
        let finalRes = await apiRes.json()
        let {results} = finalRes

        let movieItem = ''
        results.forEach((obj)=>{

            let {original_title, poster_path, release_date} = obj
            movieItem += `
            <div class="mainItem">
                <img src="https://image.tmdb.org/t/p/w1280/${poster_path}" alt="">
                <div class="content">
                    <h5>${original_title}</h5>
                    <p>${release_date}</p>
                </div>
            </div>`
        })
        mainElement.innerHTML = movieItem

        
    }

    getMovie()

    let searchInput = document.querySelector("input")

    searchInput.addEventListener("keyup",(e)=>{
        getMovie(e.target.value)
    })
</script>
</html>
