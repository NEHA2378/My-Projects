<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-box button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .weather-info {
            text-align: center;
        }

        .city-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .weather-main {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .weather-icon {
            font-size: 60px;
        }

        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }

        .description {
            font-size: 18px;
            color: #666;
            margin: 15px 0;
            text-transform: capitalize;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form class="search-box">
            <input type="text" placeholder="Enter city name..." id="searchInput">
            <button id="searchBtn">Search</button>
        </form>

        <div id="response" class="weather-info">
            
        </div>
    </div>
</body>
<script>
    let form = document.querySelector("form")
    let response = document.querySelector("#response")
    response.style.display = "none"

    form.addEventListener("submit", async(event)=>{
        let cityName = event.target.searchInput.value
        // console.log(cityName)

        event.preventDefault()

        let fetchData = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=4d8fb5b93d4af21d66a2948710284366&units=metric`)

        let finalRes = await fetchData.json()
        response.style.display= "block"
        // console.log(finalRes)
        if(finalRes.cod=="404" || finalRes.cod=="400"){
            response.innerHTML = 'City Not Found'
        }
        else{
        let {name, weather, main, wind} = finalRes
        
        response.innerHTML = `
        <h2 class="city-name">${cityName}</h2>
            
            <div class="weather-main">
                <div class="weather-icon"><img src = "https://openweathermap.org/img/w/${weather[0].icon}.png"></div>
                <div class="temperature">${main.temp}°C</div>
            </div>

            <p class="description">${weather[0].description}</p>

            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value">${main.humidity}%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value">${wind.speed} km/h</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value">${main.pressure}mb</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value">${main.feels_like}°C</div>
                </div>
            </div>`
        }
    })
</script>
</html>
<!-- https://api.openweathermap.org/data/2.5/weather?q=${Delhi}&appid=4d8fb5b93d4af21d66a2948710284366&units=metric -->
