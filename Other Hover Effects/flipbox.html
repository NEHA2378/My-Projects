<html>
<header>
    <title>Flip Box</title>
    <style>
        body {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main1 {
            width: 400px;
            height: 300px;
            position: relative;
            border: solid red 5px;

        }

        .image {
            transform: scale(1);
            position: absolute;
            transition-duration: 0.5s;
            top: 0;
        }

        .main2 {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            transform: scale(0);
            transition-duration: 0.5s;
        }

        .main1:hover .main2 {
            transform: scale(1);
        }

        .main1:hover .image {
            transform: scale(0);
        }
    </style>
</header>

<body>
    <div class="main1">
        <div class="image">
            <img src="images/lamborghini2.jpg" />
        </div>
        <div class="main2">
            <img src="images/lamborghini3.jpg" />
        </div>
    </div>
</body>

</html>
