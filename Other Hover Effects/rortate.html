<html>
    <header>
        <title>Rotate</title>
        <style>

            body{
                width: 100%;
                display: flex;
                justify-content: center;
            }

            .main{
                width: 300px;
                height: 300px;
                border: solid red 5px;
                position: relative;
            }
            .image1{
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                z-index: 7;
                transition-duration: 1.5s;
                transform-origin: center;
                
            }
            .image1 img{
                width: 100%;
                height: 100%;
                border-radius: 50%;
            }
            .image2{
                position: absolute;
                width: 75%;
                height: 75%;
                z-index: 8;
                top: 12.5%;
                left: 12.5%;
                transition-duration: 1.5s;
                transform-origin: center;
            }
            .image2 img{
                width: 100%;
                height: 100%;
                border-radius: 50%;
            }
            .image3{
                position: absolute;
                width: 50%;
                height: 50%;
                z-index: 9;
                top: 25%;
                left: 25%;
                transition-duration: 1.5s;
                transform-origin: center;
                
            }
            .image3 img{
                width: 100%;
                height: 100%;
                border-radius: 50%;
            }

            .main:hover .image3{
                transform: rotatex(360deg);
            }

            .main:hover .image2{
                rotate: -360deg;
                
            }

            .main:hover .image1{
                transform: rotatex(360deg);
            }


        </style>
    </header>
    <body>
        <div class="main">
            <div class="image1">
                <img src="images/1.jpg"/>
            </div>

            <div class="image2">
                <img src="images/2.jpg"/>
            </div>

            <div class="image3">
                <img src="images/3.jpg"/>
            </div>
        </div>
    </body>
</html>
