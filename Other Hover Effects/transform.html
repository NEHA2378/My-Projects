<html>
<header>
    <title> Tranform</title>
    <style>
        body {
            width: 100%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #9fe1e5;
            box-sizing: border-box;
        }
        .main{
            position: relative;
            width: 400px;
            height: 300px;
            overflow: hidden;
            background-size: cover;   /* fills div */
            background-position: center;
            background-repeat: no-repeat;
        }

        .main2 {
            position: absolute;
            top: 0;
            left: -200%;
            display: flex;
            /* transform-origin: left; */
            transition-duration: 2s;
            /* transform: scale(0); */
            /* justify-content: space-around; */
        }

        .main:hover .main2 {
            /* transform: scale(1); */
            
            left: 0%;
        }
    </style>
</header>

<body>
    <div class="main">
        
        <div class="main2">
            <div class="image1">
                <img src="images/lamborghini4.jpg" />
            </div>
            <div class="image2">
                <img src="images/lamborghini2.jpg"/>
            </div>

            <div class="image3">
                <img src="images/lamborghini3.jpg" />

            </div>
        </div>
    </div>

</body>

</html>
