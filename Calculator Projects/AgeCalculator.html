<script>
let age = Number(prompt("Enter Marks in Percentage"));

if (age < 3 && age >= 0.1) {
    console.log(age, "Infant");
}
else if (age < 6 && age >= 3) {
    console.log(age, "Toddler");
}
else if (age < 13 && age >= 6) {
    console.log(age, "Child");
}
else if (age < 18 && age >= 13) {
    console.log(age, "Teenager");
}
else if (age < 100 && age >= 18) {
    console.log(age, "Adult");
}
else{
    console.log("Enter correct age")
}


    
    
</script>
</html>
