<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .clock-container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .clock-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .clock-display {
            font-size: 72px;
            color: #00ff00;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .clock-time {
            margin-bottom: 15px;
        }

        .clock-ampm {
            font-size: 28px;
            color: #00ff00;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="clock-container">
        <div class="clock-title">Digital Clock</div>
        <div class="clock-display">
            <div class="clock-time"></div>
            <div class="clock-ampm"></div>
        </div>
    </div>
    <script>


        let time = document.querySelector(".clock-time")
        let myClock = () => {
            let date = new Date()
            let hours = date.getHours()>12?date.getHours()-12:date.getHours();
            let actualhours = hours<10 ? "0" + hours : hours;
            let minutes = date.getMinutes()< 10 ? "0"+ date.getMinutes() : date.getMinutes();
            let seconds = date.getSeconds()< 10 ? "0"+ date.getSeconds() : date.getSeconds();

            let ampm = document.querySelector('.clock-ampm')
            time.innerHTML = `${actualhours} : ${minutes} : ${seconds}`
            if(date.getHours()>12){
                ampm.innerHTML = "PM"
            }
            else{
                ampm.innerHTML = "AM"
            }

        }

        myClock()
        setInterval(() => {
            myClock()
        }, 1000);



    </script>
</body>

</html>
