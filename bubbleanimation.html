<html>
    <head>
        <title>
            Bubble Animation
        </title>
        <style>
            body{
                max-width: 100%;
                max-height: 100vh;
                background-color: rgb(11, 98, 169);
                position: relative;
                overflow: hidden;
            }

            .bubble1{
                width: 100px;
                height: 100px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -100px;
                left: 0px;
                animation: bubble1 10s infinite 0s linear
            }
            .bubble2{
                width: 50px;
                height: 50px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 1200px;
                animation: bubble1 5s infinite 0s linear
            }
            .bubble3{
                width: 100px;
                height: 100px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 300px;
                animation: bubble1 8s infinite 0s linear
            }
            .bubble4{
                width: 110px;
                height: 110px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 400px;
                animation: bubble1 4s infinite 0s linear
            }
            .bubble5{
                width: 80px;
                height: 80px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 500px;
                animation: bubble1 6s infinite 0s linear
            }
            .bubble6{
                width: 70px;
                height: 70px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 600px;
                animation: bubble1 10s infinite 0s linear
            }
            .bubble7{
                width: 30px;
                height: 30px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 700px;
                animation: bubble1 7s infinite 0s linear
            }
            .bubble8{
                width: 70px;
                height: 70px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 900px;
                animation: bubble1 8s infinite 0s linear
            }

            .bubble9{
                width: 150px;
                height: 150px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 800px;
                animation: bubble1 5s infinite 0s linear
            }
            .bubble10{
                width: 120px;
                height: 120px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 1300px;
                animation: bubble1 8s infinite 0s linear
            }
            .bubble11{
                width: 50px;
                height: 50px;
                box-shadow: inset 2px 2px 10px white;
                border-radius: 50%;
                position: absolute;
                bottom: -150px;
                left: 1200px;
                animation: bubble1 7s infinite 0s linear
            }

            @keyframes bubble1{
                0%{
                    bottom: -100px;
                }
                100%{
                    bottom: 100%;
                }
            }
            
        </style>
    </head>
    <body>
        <div class="bubble1"></div>
        <div class="bubble2"></div>
        <div class="bubble3"></div>
        <div class="bubble4"></div>
        <div class="bubble5"></div>
        <div class="bubble6"></div>
        <div class="bubble7"></div>
        <div class="bubble8"></div>
        <div class="bubble9"></div>
        <div class="bubble10"></div>
        <div class="bubble11"></div>
    </body>
</html>
