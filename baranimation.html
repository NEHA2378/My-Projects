<html>
    <head>
        <title>Bar Animation</title>
        <style>

            body{
                width: 100%;
                background-color: rgb(0, 0, 35);
                display: flex;
                justify-content: space-between;
                margin: auto;
            }
            .main{
                display: flex;
                justify-content: space-between;
                margin: auto;
                gap: 50px;
            }
            .bar1{
                width: 15px;
                height: 200px;
                background-color: goldenrod;
                animation: animation 2s 0s infinite linear;
            }
            .bar2{
                width: 15px;
                height: 200px;
                background-color: orangered;
                animation: animation 3s 2s infinite linear;
                
            }
            .bar3{
                width: 15px;
                height: 200px;
                background-color: green;
                animation: animation 2s 1s infinite linear;
            }
            .bar4{
                width: 15px;
                height: 200px;
                background-color: rgb(144, 25, 167);
                animation: animation 3s 1s infinite linear;
            }

            @keyframes animation {
                0%{
                    transform: scaleY(1);
                }
                50%{
                    transform: scaleY(1.5);
                }
                100%{
                    transform: scaleY(1);
                }
            }
        </style>
    </head>
    <body>
        <div class="main">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
            <div class="bar4"></div>
        </div>
    </body>
</html>
