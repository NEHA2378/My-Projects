<html>
    <head>
        <title> Wave Animation</title>
        <style>
            body{
                display: flex;
                justify-content: center;
                padding: 20px;
                align-items: center;
            }
            .main{
                position: relative;
                width: fit-content;
            }
            button{
                color: white;
                background-color: maroon;
                padding: 10px 30px;
                font-size: 26px;
                border: none;
                border-radius: 20px;
            }
            .wave{
                width: 100%;
                height: 100%;
                background-color: rgba(128, 0, 0, 0.467);
                position: absolute;
                border-radius: 20px;
                transform: scale(1);
                top: 0;
                left: 0;
                animation: animation 2s 0s infinite linear;
            }

            @keyframes animation{
                0%{
                    transform: scale(1);
                }
                50%{
                    transform: scale(1.5);
                }
                100%{
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
         <div class="main">
             <button>Enquire Now</button>
             <div class="wave"></div>
         </div>
    </body>
</html>
