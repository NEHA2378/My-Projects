<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        //Program to find out sum of all elements of an Array

        let l=[3, 7, 12, 5, 9]
        let sum=0

        for(v of l){
            sum=sum+v
        }

        document.write("Sum of the elements of given array is: ",sum)
    </script>
    
</body>
</html>
