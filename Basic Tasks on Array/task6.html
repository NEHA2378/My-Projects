<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>

        //Program to merge two arrays

        let l1=[1,2,3]
        let l2=[4,5,6]

        let l3=l1+l2

        let l4=l1.concat(l2)

        document.write(l4,"<br/>")

        document.write(l3,"<br/>")

        document.write(l1,","+l2)
    </script>
</body>
</html>
