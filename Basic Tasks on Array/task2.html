<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //Program to find out Largest element in the given array
        
        let l=[14, 25, 8, 19,32]
        let maxvalue=l[0]            //14
        for(v of l){
            if(v>maxvalue){
                maxvalue=v
            }
        }
        document.write("Largest element in the given array is ",maxvalue);
    </script>
</body>
</html>
