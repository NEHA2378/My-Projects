<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //Program to find out smallest element in the given array
        
        let l=[5, 9, 2, 14, 7]
        let minvalue=l[0]            //14
        for(v of l){
            if(v<minvalue){
                minvalue=v
            }
        }
        document.write("Smallest element in the given array is ",minvalue);
    </script>
</body>
</html>
