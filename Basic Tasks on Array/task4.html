<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //Program to find out average of element in the given array

        let l=[20, 30, 40, 50, 60]
        let sum=0

        for(v of l){
            sum=sum+v
        }
        let avg=sum/l.length

        document.write("Average of elements of given Array is ",avg)
        
    </script>
</body>
</html>
