<html>

<head>
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background: linear-gradient(135deg, #59d0eb 0%, #069098 100%);
        }

        form {
            background-color: white;
            width: 350px;
            margin: auto;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 2px #0a8eba;
            padding: 20px;
        }

        form h3 {
            text-align: center;
            color: #1dcfea;
        }

        form input {
            width: 100%;
            height: 30px;
            margin-top: 10px;
            border-radius: 5px;
            border: solid 2px #1dcfea;
            padding: 10px;
        }

        form button {
            width: 100%;
            padding: 10px 0px;
            background-color: #42b5db;
            margin-top: 10px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        form button:hover {
            transform: scale(1.035);
        }

        #clearbtn {
            margin: auto;
            display: block;
            margin-top: 40px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        #clearbtn:hover {
            transform: scale(1.20);
        }

        table {
            margin: auto;
            width: 1170px;
            margin-top: 10px;
            border-spacing: 0;
        }

        table button {
            padding: 0px 8px;
            cursor: pointer;
            border: none;
        }

        table button:hover {
            transform: scale(1.20);
        }

        table tr th,
        table tr td {
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <form action="">
        <h3>
            Enquiry Form
        </h3>
        <div>
            <input type="text" name="uname" placeholder="Enter Name">
        </div>
        <div>
            <input type="email" name="mail" placeholder="Enter Email">
        </div>
        <div>
            <input type="tel" name="phone" placeholder="Enter Phone">
        </div>
        <div>
            <button>Save</button>
        </div>
    </form>

    <button id="clearbtn">Clear All</button>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>
</body>
<script>
    let form = document.querySelector("form")
    let tbody = document.querySelector("table tbody")
    form.addEventListener("submit", (event) => {
        let userOldData = JSON.parse(localStorage.getItem("user")) ?? []
        let userObject = {
            name: event.target.uname.value,
            email: event.target.mail.value,
            phone: event.target.phone.value
        }
        userOldData.push(userObject)

        localStorage.setItem('user', JSON.stringify(userOldData))
        userList()
        event.target.reset()
        event.preventDefault()
    })

    let userList = () => {
        tbody.innerHTML = ''
        let userOldData = JSON.parse(localStorage.getItem("user")) ?? []
        let rows = ''
        userOldData.forEach((element, index) => {
            rows += `<tr>
                <td>${index + 1}</td>
                <td>${element.name}</td>
                <td>${element.email}</td>
                <td>${element.phone}</td>
                <td><button onclick="removeRow(${index})">Delete</button></td>
            </tr>`
        });

        tbody.innerHTML = rows;
    }

    userList()

    let clearbtn = document.querySelector("#clearbtn");
    clearbtn.addEventListener("click", () => {
        localStorage.clear('user')
        userList()
    })

    // let rowclearbtn = document.querySelector("table thead tr th button")
    // rowclearbtn.addEventListener("click", (e) => {
    //     e.target.parentElement.remove();
    //     userList()
    // })

    function removeRow(index){
        let userOldData = JSON.parse(localStorage.getItem("user")) ?? [];
        userOldData.splice(index,1)
         localStorage.setItem('user', JSON.stringify(userOldData))
        userList()
    }
</script>

</html>
