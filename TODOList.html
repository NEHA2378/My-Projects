<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TODO List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        ul {
            list-style: none;
        }

        li {
            padding: 15px;
            background: #f5f5f5;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .error {
            font-size: 12px;
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 My TODO List</h1>
        <div class="error"></div>
        <form class="input-group">

            <input name="userText" type="text" id="todoInput" placeholder="Add a new task...">
            <button id="addBtn">Add</button>
        </form>
        <ul id="todoList">

        </ul>
    </div>


    <script>

        let UserTODOList = [];
        let error = document.querySelector(".error");
        let formElement = document.querySelector("form");
        formElement.addEventListener("submit", (e) => {
            e.preventDefault();    // prevents page refresh
            let userValue = e.target.userText.value;            //TextBox Value
            if (userValue.trim() === "") {
                error.innerHTML = "Task cannot be empty!";
                setTimeout(() => {
                    error.innerHTML = "";
                }, 2000);
                return;
            }
            if (UserTODOList.includes(userValue)) {
                error.innerHTML = "Task already exists!";
                setTimeout(() => {
                    error.innerHTML = "";
                }, 2000);
                return;
            }



            UserTODOList.push(userValue);
            e.target.reset();    // Clear the input field

            showTODO();

            saveData();

        })

        let ULElement = document.querySelector("#todoList");


        let showTODO = () => {
            let list = ``;
            UserTODOList.forEach((value, index) => {
                list += `<li><span>${value}</span>
                <button data-id="${index}" class="delete-btn">Delete</button>
            </li>`;

            });


            ULElement.innerHTML = list;
        }

        ULElement.addEventListener("click", (e) => {
            let currentElement = e.target;
            if (currentElement.tagName === "BUTTON") {
                if (!confirm("Are you sure you want to delete this task?")) {
                    return;
                }
                else {

                    let delIndex = currentElement.getAttribute("data-id");
                    UserTODOList.splice(delIndex, 1);
                    showTODO();
                }
                saveData();
            }
        })

        function saveData() {
            localStorage.setItem("TodoList", JSON.stringify(UserTODOList));
        }

        function showTask (){
            let savedTasks = localStorage.getItem("TodoList");
            if (savedTasks) {
                UserTODOList = JSON.parse(savedTasks);
                showTODO();
            }
        }
        showTask();
    </script>
</body>



</html>
