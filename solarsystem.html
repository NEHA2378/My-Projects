<html>

<head>
    <title>Solar System</title>
    <style>
        body {
            max-width: 100%;
            /* max-height: 100%; */
            background-color: rgb(1, 1, 42);
            margin: auto;
            display: flex;
            justify-content: center;
            border: solid red 2px;
        }

        .main {
            width: 700px;
            height: 700px;
            /* border: solid red 1px; */
            margin: auto;
            position: relative;
        }

        .sun {
            width: 100px;
            height: 100px;
            background-color: gold;
            border-radius: 50%;
            position: absolute;
            box-shadow: 1px 1px 50px gold;
            top: 300px;
            left: 300px;
        }

        .path1 {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: solid gray 1px;
            position: absolute;
            top: 250px;
            left: 250px;
            animation: moonanimation 20s 0s infinite linear;
        }

        .planet1 {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            background-color: whitesmoke;
            left: 95px;
            top: -5px;
        }

        .path2 {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: solid gray 1px;
            position: absolute;
            top: 200px;
            left: 200px;
            animation: moonanimation 25s 0s infinite linear;
        }

        .planet2 {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            background-color: rgb(158, 134, 57);
            left: 135px;
            top: -5px;
        }

        .path3{
            width: 400px;
            height: 400px;
            border: solid gray 1px;
            border-radius: 50%;
            position: absolute;
            top: 150px;
            left: 150px;
            animation: moonanimation 40s 0s infinite linear;
        }

        .moonpath{
            width: 25px;
            height: 25px;
            /* border: solid gray 1px; */
            border: 50%;
            position: absolute;
            left: 175px;
            top: -12px;
            animation: moonanimation 10s 0s infinite linear;
        }

        .moon{
            width: 5px;
            height: 5px;
            background-color: gray;
            border-radius: 50%;
            
        }

        .planet3{
            width: 15px;
            height: 15px;
            background-color: rgb(24, 64, 225);
            border-radius: 50%;
            position: absolute;
            left: 5px;
            top: 5px;
        }

        .path4{
            width: 500px;
            height: 500px;
            border: solid gray 1px;
            border-radius: 50%;
            position: absolute;
            top: 100px;
            left: 100px;
            animation: moonanimation 30s 0s infinite linear;
        }

        .planet4{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: orange;
            position: relative;
            left: 235px;
            top: -10px;

        }

        .path5{
            width: 600px;
            height: 600px;
            border: solid gray 1px;
            border-radius: 50%;
            position: absolute;
            top: 50px;
            left: 50px;
            animation: moonanimation 35s 0s infinite linear;
        }

        .planet5{
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgb(168, 58, 22);
            position: relative;
            left: 285px;
            top: -5px;

        }

        .path6{
            width: 700px;
            height: 700px;
            border: solid gray 1px;
            border-radius: 50%;
            position: absolute;
            top: 0px;
            left: 0px;
            animation: moonanimation 45s 0s infinite linear;
        }

        .planet6{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: gray;
            position: relative;
            left: 340px;
            top: -10px;

        }

        .ring{
            width: 10px;
            height: 30px;
            border: solid brown 3px;
            border-radius: 80%;
            /* background-color: gray; */
            position: absolute;
            left: 342px;
            top: -17px;
        }


        @keyframes moonanimation{
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="sun"></div>
        <div class="path1">
            <div class="planet1"></div>
        </div>
        <div class="path2">
            <div class="planet2"></div>
        </div>
        <div class="path3">
            <div class="moonpath">
            <div class="planet3"></div>
            <div class="moon"></div>
            </div>
        </div>
        <div class="path4">
            <div class="planet4"></div>
        </div>
        <div class="path5">
            <div class="planet5"></div>
        </div>
        <div class="path6">
            <div class="planet6"></div>
            <div class="ring"></div>
        </div>
    </div>
</body>

</html>
